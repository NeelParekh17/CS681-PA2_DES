# Quick experiment sweep (edit values as needed for final analysis).

sim.cores=4
sim.maxThreads=16
# Max queued requests waiting for a thread (-1 = unbounded queue).
sim.maxQueue=100000
sim.quantum=5ms
sim.ctxSwitch=0.2ms

sim.warmup=0.5s
sim.measure=300s

dist.think=triangular(5ms, 10ms, 20ms)
# The Exponential Server (High Variance)
dist.service=shifted(2ms, exponential(14ms))

# The Uniform Server (Medium Variance)
# dist.service=uniform(2ms, 30ms)

# The Constant Server (Zero Variance)
# dist.service=constant(16ms)

dist.timeout=shifted(4s, uniform(0s, 2s))

experiment.userCounts=10
experiment.replications=8
experiment.baseSeed=12345

trace.enabled=false
trace.level=SUMMARY
trace.maxLines=0

