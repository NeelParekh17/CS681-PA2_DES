# Small demo run with verbose trace.

sim.cores=2
sim.maxThreads=4
# Max queued requests waiting for a thread (-1 = unbounded queue).
sim.maxQueue=-1
sim.users=5
sim.quantum=5ms
sim.ctxSwitch=0.2ms

sim.warmup=0s
sim.measure=2s

dist.think=triangular(10ms, 30ms, 80ms)
dist.service=shifted(5ms, exponential(30ms))
dist.timeout=uniform(20ms, 40ms)

trace.enabled=true
trace.level=VERBOSE
trace.maxLines=5000

