# Welch-specific config to expose startup transient and steady-state behavior.
# Use with: ./scripts/run_welch.sh configs/welch.properties out/welch.csv

sim.cores=4
sim.maxThreads=16
sim.users=60
sim.quantum=5ms
sim.ctxSwitch=0.2ms

# Not used directly by welch mode, but kept for consistency.
sim.warmup=0s
sim.measure=60s

# Short think times + variable service induce queue buildup from empty start.
dist.think=uniform(1ms, 12ms)
dist.service=shifted(2ms, exponential(14ms))

# Keep timeout loose so Welch reflects service/queueing dynamics, not deadline censoring.
dist.timeout=constant(5s)

# Welch controls (used in --mode welch)
welch.users=60
welch.duration=120s
welch.bin=1s
welch.replications=12
welch.baseSeed=12345

trace.enabled=false
trace.level=SUMMARY
trace.maxLines=0
