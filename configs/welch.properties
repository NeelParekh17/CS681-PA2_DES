# Welch-specific config to expose startup transient and steady-state behavior.
# Use with: ./scripts/run_welch.sh configs/welch.properties out/welch.csv

sim.cores=4
sim.maxThreads=16
# Max queued requests waiting for a thread (-1 = unbounded queue).
sim.maxQueue=-1
sim.users=10
sim.quantum=5ms
sim.ctxSwitch=0.2ms

# Not used directly by welch mode, but kept for consistency.
sim.warmup=0s
sim.measure=60s

dist.think=triangular(5ms, 10ms, 20ms)
# The Exponential Server (High Variance)
dist.service=shifted(2ms, exponential(14ms))

# The Uniform Server (Medium Variance)
# dist.service=uniform(2ms, 30ms)

# The Constant Server (Zero Variance)
# dist.service=constant(16ms)

dist.timeout=shifted(4s, uniform(0s, 2s))

# Welch controls (used in --mode welch)
welch.users=11
welch.duration=60s
welch.bin=100ms
welch.replications=30
welch.baseSeed=12345

# Plotting analysis parameters (passed via CLI in run_welch.sh)
welch.window=7
welch.stabilityBins=8
welch.stabilityPct=5.0
welch.xAxis=completed
welch.autoZoom=on
welch.xMax=20000

trace.enabled=false
trace.level=SUMMARY
trace.maxLines=0
